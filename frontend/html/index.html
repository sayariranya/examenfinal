<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des Propositions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <h1>📋 Gestion des Propositions</h1>

    <div class="card">
      <h2>Soumettre une proposition</h2>
      <input type="number" id="etudiant_id" placeholder="ID Étudiant" />
      <input type="text" id="titre" placeholder="Titre" />
      <textarea id="description" placeholder="Description..."></textarea>
      <button onclick="creerProposition()">Soumettre</button>
    </div>

    <div class="card">
      <h2>Modifier une proposition</h2>
      <input type="number" id="modif_id" placeholder="ID de la proposition" />
      <input type="text" id="modif_titre" placeholder="Nouveau titre" />
      <textarea id="modif_description" placeholder="Nouvelle description..."></textarea>
      <button onclick="modifierProposition()">Modifier</button>
    </div>
    <div class="button">
        <button onclick="validerProposition()" class="btn-valider">✅ Valider (Admin)</button>
      </div>
    </div>

    <div id="message" class="message"></div>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
