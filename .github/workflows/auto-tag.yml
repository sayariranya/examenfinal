name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 1. BUILD
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build
        run: echo "✅ Build réussi"

  # 2. TESTS
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Run tests
        run: echo "✅ Tests réussis"

  # 3. AUTO TAG
  tag:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create new tag
        run: |
          git fetch --tags
          LATEST=$(git tag | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW="v$MAJOR.$MINOR.$((PATCH + 1))"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag -a $NEW -m "Auto tag $NEW"
          git push origin $NEW